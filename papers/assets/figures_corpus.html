<!doctype html>
<html lang="en">
<body>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1500" height="620" viewBox="0 0 1500 620" role="img"
     aria-labelledby="title desc">
  <title id="title">MaternaQA-es corpus construction pipeline</title>
  <desc id="desc">Four structured phases transform PDF representations into a retrieval corpus.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" markerWidth="6" markerHeight="6" refX="8.5" refY="5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#4A4A4A"/>
    </marker>
    <marker id="arrow-dashed" viewBox="0 0 10 10" markerWidth="5.5" markerHeight="5.5" refX="8.5" refY="5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#9A9A9A"/>
    </marker>
    <style>
      text { font-family: Helvetica, Arial, sans-serif; fill: #222; }
      .kicker { font-size: 13px; font-weight: 700; letter-spacing: 1px; fill: #5A5A5A; }
      .label { font-size: 17px; font-weight: 700; }
      .detail { font-size: 13px; }
      .count { font-size: 15px; font-weight: 700; }
      .stage { font-size: 13px; font-weight: 700; fill: #5A5A5A; }
      .node { stroke: #5A5A5A; stroke-width: 1.5; rx: 8; }
      .panel { fill: none; stroke: #D0D0D0; stroke-width: 1.2; rx: 16; }
      .panelRule { stroke: #D0D0D0; stroke-width: 1; }
      rect[fill="#E1F0F8"] { fill: #BBE5F2; }
      rect[fill="#E2F3F0"] { fill: #D6EFD9; }
      rect[fill="#FBEBDC"] { fill: #FBE0B8; }
      .flow { fill: none; stroke: #4A4A4A; stroke-width: 1.5; marker-end: url(#arrow); }
      .branch { fill: none; stroke: #4A4A4A; stroke-width: 1.5; marker-end: url(#arrow); }
      .dashed { fill: none; stroke: #9A9A9A; stroke-width: 1.4; stroke-dasharray: 5 4; marker-end: url(#arrow-dashed); }
      .icon { color: #222; }
    </style>
    <g id="fileIcon" class="icon" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 2h9l5 5v15H5z"/><path d="M14 2v6h6M8 13h8M8 17h8"/>
    </g>
    <g id="cleanIcon" class="icon" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 20h16M6 16l4-12 4 12M8 11h5M15 7l2-2 3 3-2 2"/>
    </g>
    <g id="groupIcon" class="icon" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="8" height="6" rx="1"/><rect x="13" y="4" width="8" height="6" rx="1"/><rect x="8" y="15" width="8" height="6" rx="1"/>
      <path d="M7 10v2h10v-2M12 12v3"/>
    </g>
    <g id="chunkIcon" class="icon" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 3h14v18H5zM8 7h8M8 11h8M8 15h5"/><path d="M16 18l3 3"/>
    </g>
    <g id="dedupeIcon" class="icon" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="4" y="4" width="12" height="14" rx="1"/><path d="M8 8h5M8 12h5M8 16h3M8 20h12V7"/>
    </g>
    <g id="filterIcon" class="icon" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 5h18l-7 8v6l-4 2v-8z"/>
    </g>
    <g id="databaseIcon" class="icon" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <ellipse cx="12" cy="5" rx="8" ry="3"/><path d="M4 5v7c0 1.7 3.6 3 8 3s8-1.3 8-3V5M4 12v7c0 1.7 3.6 3 8 3s8-1.3 8-3v-7"/>
    </g>
    <g id="searchIcon" class="icon" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="10.5" cy="10.5" r="6.5"/><path d="M16 16l5 5"/>
    </g>
    <g id="mergeIcon" class="icon" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 3v6c0 2 2 3 4 3h4c2 0 4 1 4 3v6M18 17l-3 3 3 3M18 3v3c0 2-2 3-4 3h-2"/>
    </g>
  </defs>

  <!-- Phase structure -->
  <g transform="translate(45 40)">
     <rect class="panel" width="330" height="455"/>
     <text class="kicker" x="24" y="30">SOURCE PREPARATION</text>
  </g>
  <g transform="translate(405 40)">
     <rect class="panel" width="330" height="455"/>
     <text class="kicker" x="24" y="30">CHUNK CONSTRUCTION</text>
  </g>
  <g transform="translate(765 40)">
     <rect class="panel" width="330" height="455"/>
     <text class="kicker" x="24" y="30">QUALITY CONTROL</text>
  </g>
  <g transform="translate(1125 40)">
     <rect class="panel" width="330" height="455"/>
     <text class="kicker" x="24" y="30">RETRIEVAL CORPUS</text>
  </g>

  <!-- Inter-phase connectors -->
  <path class="flow" d="M375 345H405"/>
  <path class="flow" d="M735 345H765"/>
  <path class="flow" d="M1095 345H1125"/>

  <!-- Source preparation -->
  <path class="flow" d="M210 185V230"/>
  <path class="flow" d="M210 315V360"/>
  <g transform="translate(80 100)">
        <rect class="node" width="260" height="85" fill="#E1F0F8"/>
    <use xlink:href="#fileIcon" x="12" y="30" width="24" height="24"/>
    <text class="stage" x="44" y="25">INPUT</text><text class="label" x="44" y="49">PDF source</text><text class="count" x="44" y="70">57 representations</text>
  </g>
  <g transform="translate(80 230)">
        <rect class="node" width="260" height="85" fill="#E2F3F0"/>
    <use xlink:href="#cleanIcon" x="12" y="30" width="24" height="24"/>
    <text class="label" x="44" y="30">Extract and clean</text><text class="detail" x="44" y="52">text normalization</text><text class="detail" x="44" y="69">layout cleanup</text>
  </g>
  <g transform="translate(80 360)">
        <rect class="node" width="260" height="85" fill="#FBEBDC"/>
    <use xlink:href="#groupIcon" x="12" y="30" width="24" height="24"/>
    <text class="label" x="44" y="30">Group structure</text><text class="detail" x="44" y="52">by PDF and section</text><text class="detail" x="44" y="69">paragraph accumulation</text>
  </g>

  <!-- Chunk construction -->
  <path class="flow" d="M570 185V230"/>
  <path class="flow" d="M570 315V360"/>
  <g transform="translate(440 100)">
        <rect class="node" width="260" height="85" fill="#E8DDF3"/>
    <use xlink:href="#chunkIcon" x="12" y="30" width="24" height="24"/>
    <text class="stage" x="44" y="25">STAGE 04</text><text class="label" x="44" y="49">Construct chunks</text><text class="detail" x="44" y="70">500–1200 estimated tokens</text>
  </g>
  <g transform="translate(440 230)">
        <rect class="node" width="260" height="85" fill="#E8DDF3"/>
    <use xlink:href="#chunkIcon" x="12" y="30" width="24" height="24"/>
    <text class="label" x="44" y="30">Boundary carry-over</text><text class="detail" x="44" y="52">retain tail_words = 80</text><text class="detail" x="44" y="69">about 108 estimated tokens</text>
  </g>
  <g transform="translate(440 360)">
        <rect class="node" width="260" height="85" fill="#FBEBDC"/>
    <use xlink:href="#chunkIcon" x="12" y="30" width="24" height="24"/>
    <text class="label" x="44" y="30">Chunk records</text><text class="detail" x="44" y="52">text segments prepared</text><text class="detail" x="44" y="69">for quality control</text>
  </g>

  <!-- Quality control -->
  <path class="flow" d="M930 185V230"/>
  <path class="flow" d="M930 315V360"/>
  <g transform="translate(800 100)">
      <rect class="node" width="260" height="85" fill="#E8DDF3"/>
    <use xlink:href="#dedupeIcon" x="12" y="30" width="24" height="24"/>
    <text class="stage" x="44" y="25">STAGE 05</text><text class="label" x="44" y="49">Deduplicate</text><text class="detail" x="44" y="70">stable chunk identity</text>
  </g>
  <g transform="translate(800 230)">
        <rect class="node" width="260" height="85" fill="#E2F3F0"/>
    <use xlink:href="#databaseIcon" x="12" y="30" width="24" height="24"/>
    <text class="label" x="44" y="30">Assign metadata</text><text class="detail" x="44" y="52">ID and provenance</text><text class="detail" x="44" y="69">retrieval-ready records</text>
  </g>
  <g transform="translate(800 360)">
        <rect class="node" width="260" height="85" fill="#FBEBDC"/>
    <use xlink:href="#filterIcon" x="12" y="30" width="24" height="24"/>
    <text class="label" x="44" y="30">Apply filters</text><text class="detail" x="44" y="52">estimated tokens ≥ 180</text><text class="detail" x="44" y="69">clinical_score ≥ 5</text>
  </g>

  <!-- Retrieval corpus -->
  <g transform="translate(1160 100)">
        <rect class="node" width="260" height="85" fill="#E1F0F8"/>
    <use xlink:href="#databaseIcon" x="12" y="30" width="24" height="24"/>
    <text class="stage" x="44" y="25">OUTPUT</text><text class="label" x="44" y="49">Retrieval corpus</text><text class="count" x="44" y="70">2,268 chunks</text>
  </g>
  <path class="flow" d="M1290 185V230"/>
  <g transform="translate(1160 230)">
        <rect class="node" width="260" height="85" fill="#E2F3F0"/>
    <use xlink:href="#searchIcon" x="12" y="30" width="24" height="24"/>
    <text class="label" x="44" y="30">Dense retrieval</text><text class="detail" x="44" y="52">BGE-M3 embeddings</text><text class="detail" x="44" y="69">default k = 5</text>
  </g>
  <path class="branch" d="M1290 315V340H1200V360"/>
  <path class="branch" d="M1290 315V340H1380V360"/>
  <g transform="translate(1160 360)">
        <rect class="node" width="120" height="85" fill="#FBEBDC"/>
    <use xlink:href="#searchIcon" x="10" y="30" width="22" height="22"/>
    <text class="label" x="36" y="30">Sparse</text><text class="detail" x="36" y="52">BM25</text><text class="detail" x="36" y="69">retrieval</text>
  </g>
  <g transform="translate(1320 360)">
        <rect class="node" width="120" height="85" fill="#F0F0F0"/>
    <use xlink:href="#mergeIcon" x="10" y="30" width="22" height="22"/>
    <text class="label" x="36" y="30">Fused</text><text class="detail" x="36" y="52">RRF</text><text class="detail" x="36" y="69">rank 60</text>
  </g>

</svg>
</body>
</html>
