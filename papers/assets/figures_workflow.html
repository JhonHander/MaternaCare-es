<!doctype html>
<html lang="en">
<body>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1320" height="430" viewBox="0 0 1320 430" role="img"
     aria-labelledby="title desc">
  <title id="title">MaternaQA-es benchmark workflow</title>
  <desc id="desc">The benchmark moves from the dataset and evidence corpus through the factorial conditions and inference strategies to paired evaluation.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" markerWidth="6" markerHeight="6" refX="8.5" refY="5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#4A4A4A"/>
    </marker>
    <style>
      text { font-family: Helvetica, Arial, sans-serif; fill: #222; }
      .kicker { font-size: 13px; font-weight: 700; letter-spacing: 1px; fill: #5A5A5A; }
      .label { font-size: 16px; font-weight: 700; }
      .detail { font-size: 13px; }
      .node { stroke: #5A5A5A; stroke-width: 1.5; rx: 8; }
      .panel { fill: #FFF; stroke: #D0D0D0; stroke-width: 1.2; rx: 16; }
      .flow { fill: none; stroke: #4A4A4A; stroke-width: 1.5; marker-end: url(#arrow); }
      .icon { fill: none; stroke: #222; stroke-width: 2.1; stroke-linecap: round; stroke-linejoin: round; }
    </style>
    <symbol id="datasetIcon" viewBox="0 0 24 24">
      <path class="icon" d="M5 3h10l4 4v14H5zM15 3v5h4M8 12h8M8 16h8M8 20h5"/>
    </symbol>
    <symbol id="factorIcon" viewBox="0 0 24 24">
      <path class="icon" d="M4 5h16M4 12h16M4 19h16M8 3v4M16 10v4M11 17v4"/>
      <circle class="icon" cx="8" cy="5" r="2" fill="#FFF"/>
      <circle class="icon" cx="16" cy="12" r="2" fill="#FFF"/>
      <circle class="icon" cx="11" cy="19" r="2" fill="#FFF"/>
    </symbol>
    <symbol id="retrievalIcon" viewBox="0 0 24 24">
      <circle class="icon" cx="11" cy="11" r="7"/>
      <path class="icon" d="m16 16 5 5M8 11h6M11 8v6"/>
    </symbol>
    <symbol id="answerIcon" viewBox="0 0 24 24">
      <path class="icon" d="M6 22a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8l6 6v12a2 2 0 0 1-2 2zM14 2v6h6M8 13h8M8 17h6"/>
    </symbol>
  </defs>

  <!-- Dataset and evidence -->
  <g transform="translate(30 35)">
    <rect class="panel" width="290" height="360"/>
    <text class="kicker" x="24" y="30">DATA AND EVIDENCE</text>
    <path class="flow" d="M145 175V205"/>
    <g transform="translate(25 85)">
      <rect class="node" width="240" height="90" fill="#BBE5F2"/>
      <use xlink:href="#datasetIcon" x="16" y="33" width="24" height="24"/>
      <text class="label" x="54" y="40">MaternaQA-es</text>
      <text class="detail" x="54" y="65">5,727 QA pairs</text>
    </g>
    <g transform="translate(25 205)">
      <rect class="node" width="240" height="90" fill="#D6EFD9"/>
      <use xlink:href="#datasetIcon" x="16" y="33" width="24" height="24"/>
      <text class="label" x="54" y="40">Evidence corpus</text>
      <text class="detail" x="54" y="65">2,268 document chunks</text>
    </g>
  </g>

  <!-- Factorial conditions -->
  <path class="flow" d="M320 215H350"/>
  <g transform="translate(350 35)">
    <rect class="panel" width="290" height="360"/>
    <text class="kicker" x="24" y="30">FACTORIAL CONDITIONS</text>
    <path class="flow" d="M145 143V168"/>
    <path class="flow" d="M145 226V251"/>
    <g transform="translate(25 85)">
      <rect class="node" width="240" height="58" fill="#BBE5F2"/>
      <use xlink:href="#factorIcon" x="16" y="17" width="24" height="24"/>
      <text class="label" x="54" y="27">Model family</text>
      <text class="detail" x="54" y="47">2 levels</text>
    </g>
    <g transform="translate(25 168)">
      <rect class="node" width="240" height="58" fill="#FBE0B8"/>
      <use xlink:href="#factorIcon" x="16" y="17" width="24" height="24"/>
      <text class="label" x="54" y="27">Adaptation state</text>
      <text class="detail" x="54" y="47">Base or grounded QLoRA</text>
    </g>
    <g transform="translate(25 251)">
      <rect class="node" width="240" height="58" fill="#E8DDF3"/>
      <use xlink:href="#factorIcon" x="16" y="17" width="24" height="24"/>
      <text class="label" x="54" y="27">Retrieval strategy</text>
      <text class="detail" x="54" y="47">2 x 2 x 3 = 12 conditions</text>
    </g>
  </g>

  <!-- Inference strategies -->
  <path class="flow" d="M640 215H670"/>
  <g transform="translate(670 35)">
    <rect class="panel" width="290" height="360"/>
    <text class="kicker" x="24" y="30">INFERENCE PROTOCOL</text>
    <g transform="translate(25 85)">
      <rect class="node" width="240" height="58" fill="#F0F0F0"/>
      <use xlink:href="#retrievalIcon" x="16" y="17" width="24" height="24"/>
      <text class="label" x="54" y="27">no_rag</text>
      <text class="detail" x="54" y="47">Question only</text>
    </g>
    <g transform="translate(25 168)">
      <rect class="node" width="240" height="58" fill="#D6EFD9"/>
      <use xlink:href="#retrievalIcon" x="16" y="17" width="24" height="24"/>
      <text class="label" x="54" y="27">Hybrid</text>
      <text class="detail" x="54" y="47">BM25 + BGE-M3 + RRF</text>
    </g>
    <g transform="translate(25 251)">
      <rect class="node" width="240" height="58" fill="#FBE0B8"/>
      <use xlink:href="#retrievalIcon" x="16" y="17" width="24" height="24"/>
      <text class="label" x="54" y="27">Independent HyDE</text>
      <text class="detail" x="54" y="47">Hypothetical text -&gt; BGE-M3</text>
    </g>
  </g>

  <!-- Evaluation -->
  <path class="flow" d="M960 215H990"/>
  <g transform="translate(990 35)">
    <rect class="panel" width="290" height="360"/>
    <text class="kicker" x="24" y="30">ANSWER AND EVALUATION</text>
    <path class="flow" d="M145 143V168"/>
    <path class="flow" d="M145 226V251"/>
    <g transform="translate(25 85)">
      <rect class="node" width="240" height="58" fill="#BBE5F2"/>
      <use xlink:href="#answerIcon" x="16" y="17" width="24" height="24"/>
      <text class="label" x="54" y="27">Answer model</text>
      <text class="detail" x="54" y="47">Spanish prompt + context</text>
    </g>
    <g transform="translate(25 168)">
      <rect class="node" width="240" height="58" fill="#D6EFD9"/>
      <use xlink:href="#answerIcon" x="16" y="17" width="24" height="24"/>
      <text class="label" x="54" y="27">Generated answer</text>
      <text class="detail" x="54" y="47">Up to 512 new tokens</text>
    </g>
    <g transform="translate(25 251)">
      <rect class="node" width="240" height="58" fill="#FBE0B8"/>
      <use xlink:href="#answerIcon" x="16" y="17" width="24" height="24"/>
      <text class="label" x="54" y="27">Paired evaluation</text>
      <text class="detail" x="54" y="47">328 held-out items by qa_id</text>
    </g>
  </g>
</svg>
</body>
</html>
