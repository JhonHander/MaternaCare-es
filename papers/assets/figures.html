<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG architectures</title>
<style>
  :root {
    --blue: #0077BB;
    --blue-dark: #025a8c;
    --blue-tint: #BBE5F2;
    --teal: #009988;
    --teal-dark: #006861;
    --teal-tint: #D6EFD9;
    --orange: #D3651F;
    --orange-dark: #A84E16;
    --orange-tint: #FBE0B8;
    --slate: #5A5A5A;
    --slate-dark: #3A3A3A;
    --slate-tint: #F0F0F0;
    --ink: #1F1F1F;
    --line: #4A4A4A;
    --line-soft: #9A9A9A;
    --bg: #FAFAFA;
    --border: #E4E4E4;
    --white: #FFFFFF;

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background: #FFFFFF;
    color: var(--ink);
    margin: 0;
    line-height: 1.5;
  }
  svg { display: block; margin: 0 auto; width: 100%; height: auto; }
  svg text { font-family: 'Inter','Helvetica Neue',Helvetica,Arial,sans-serif; }
</style>
</head>
<body>
  <svg viewBox="-120 -20 1320 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig1-title" preserveAspectRatio="xMidYMid meet">

    <defs>

      </marker>

      <!-- =============== Lucide icons → reusable <symbol> =============== -->

      <symbol id="i-question" viewBox="0 0 24 24">

        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M12 17h.01" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

        <path d="M16 13H8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M16 17H8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </symbol>

        <path d="M6.003 5.125A3 3 0 0 0 6.401 6.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M3.477 10.896a4 4 0 0 1 .585-.396" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M6 18a4 4 0 0 1-1.967-.516" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M12 13h4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M12 18h6a2 2 0 0 1 2 2v1" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

        <circle cx="16" cy="13" r=".5" fill="currentColor"/>
        <circle cx="18" cy="3" r=".5" fill="currentColor"/>
        <circle cx="20" cy="21" r=".5" fill="currentColor"/>

        <path d="M3 5V19A9 3 0 0 0 21 19V5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M3 12A9 3 0 0 0 21 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

        <path d="m21 21-4.34-4.34" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="11" cy="11" r="8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </symbol>

      <symbol id="i-merge" viewBox="0 0 24 24">

        <path d="m14 7 3 3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M5 6v4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

        <path d="M21 16h-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M11 3H9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </symbol>

      <symbol id="i-sparkles" viewBox="0 0 24 24">

     <style>
       rect { stroke: #5A5A5A !important; stroke-width: 1.5 !important; rx: 8; }
       .panel { fill: none !important; stroke: #D0D0D0 !important; stroke-width: 1.2 !important; rx: 16 !important; }
       rect.dashed-node { stroke: #9A9A9A !important; stroke-width: 1.4 !important; stroke-dasharray: 5 4 !important; }
       rect[fill="#E1F0F8"] { fill: #BBE5F2 !important; }
       rect[fill="#E2F3F0"] { fill: #D6EFD9 !important; }
       rect[fill="#FBEBDC"] { fill: #FBE0B8 !important; }
       .flow { fill: none; stroke: #4A4A4A; stroke-width: 1.5; marker-end: url(#arrow); }
       .dashed { fill: none; stroke: #9A9A9A; stroke-width: 1.4; stroke-dasharray: 5 4; marker-end: url(#arrow-dashed); }
     </style>

     <!-- Independent architecture containers -->
     <rect class="panel" x="20" y="56" width="320" height="594"/>
     <rect class="panel" x="380" y="56" width="320" height="594"/>
     <rect class="panel" x="740" y="56" width="320" height="594"/>
     <text x="180" y="78" text-anchor="middle" font-size="13" font-weight="600" fill="#222">No RAG</text>
     <text x="540" y="78" text-anchor="middle" font-size="13" font-weight="600" fill="#222">Hybrid RAG</text>
     <text x="900" y="78" text-anchor="middle" font-size="13" font-weight="600" fill="#222">HyDE RAG</text>

    <!-- ===================================================== -->
    <!-- Reusable stage box renderer (drawn inline per stage)   -->
    <!-- Convention per stage box (box h=56, width=160 default): -->
    <!--   <rect rx=8 stroke=accent stroke-width=1.5 fill=tint   -->
    <!--        x=cx-80 y=cy-28 width=160 height=56/>            -->
    <!--   <use href=#i-... x=cx-80+12 y=cy-12 width=24 height=24 -->
    <!--        style=color:accent/>                             -->
    <!--   <text x=cx-80+44 y=cy-3 ... >Title</text>             -->
    <!--   <text x=cx-80+44 y=cy+13 ... >sub</text>              -->
    <!-- ===================================================== -->

    <!-- ============ COLUMN A · no_rag (centerX=180) ============ -->
    <!-- S1 Question -->
    <rect x="100" y="92" width="160" height="56" rx="8" fill="#F0F0F0" stroke="#5A5A5A" stroke-width="1.5"/>
    <use href="#i-question" x="112" y="108" width="24" height="24" style="color:#5A5A5A"/>
    <text x="144" y="115" font-size="12" font-weight="600" fill="#3A3A3A">Question</text>
    <text x="144" y="131" font-size="9.5" fill="#7A7A7A">clinical (ES)</text>

    <!-- long dashed arrow from S1 bottom (150) → S5 top (492) -->
     <line class="dashed" x1="180" y1="150" x2="180" y2="490"/>
    <text x="196" y="322" font-size="10.5" fill="#8A8A8A" font-style="italic">retrieval</text>
    <text x="196" y="336" font-size="10.5" fill="#8A8A8A" font-style="italic">omitted</text>

    <!-- S5 LLM -->
    <rect x="100" y="492" width="160" height="56" rx="8" fill="#E1F0F8" stroke="#0077BB" stroke-width="1.5"/>
    <use href="#i-llm" x="112" y="508" width="24" height="24" style="color:#025a8c"/>
    <text x="144" y="515" font-size="12" font-weight="600" fill="#025a8c">Model</text>
    <text x="144" y="531" font-size="9.5" fill="#3F7AA0">without context</text>

    <!-- arrow S5→S6 -->
     <line class="flow" x1="180" y1="550" x2="180" y2="582"/>
    <text x="188" y="570" font-size="9.5" fill="#8A8A8A">generates</text>

    <!-- S6 Answer -->
    <rect x="100" y="582" width="160" height="56" rx="8" fill="#F0F0F0" stroke="#5A5A5A" stroke-width="1.5"/>
    <use href="#i-answer" x="112" y="598" width="24" height="24" style="color:#5A5A5A"/>
    <text x="144" y="605" font-size="12" font-weight="600" fill="#3A3A3A">Answer</text>
    <text x="144" y="621" font-size="9.5" fill="#7A7A7A">generated</text>

    <!-- ============ COLUMN B · Hybrid (centerX=540) ============ -->

    <rect x="460" y="92" width="160" height="56" rx="8" fill="#F0F0F0" stroke="#5A5A5A" stroke-width="1.5"/>
    <use href="#i-question" x="472" y="108" width="24" height="24" style="color:#5A5A5A"/>

    <!-- arrow S1→S2 -->
     <line class="flow" x1="540" y1="150" x2="540" y2="190"/>

    <!-- S2 Corpus (DB) -->
    <rect x="460" y="192" width="160" height="56" rx="8" fill="#E2F3F0" stroke="#009988" stroke-width="1.5"/>
    <use href="#i-db" x="472" y="208" width="24" height="24" style="color:#006861"/>
    <text x="504" y="215" font-size="12" font-weight="600" fill="#006861">Corpus</text>
    <text x="504" y="231" font-size="9.5" fill="#3F9A8C">2,268 chunks</text>

     <line class="flow" x1="602" y1="278" x2="602" y2="290"/>

    <use href="#i-search" x="428" y="308" width="22" height="22" style="color:#006861"/>

    <text x="504" y="531" font-size="9.5" fill="#3F7AA0">+ context</text>

    <!-- arrow S5→S6 -->

    <text x="548" y="570" font-size="9.5" fill="#8A8A8A">generates</text>

    <!-- S6 Answer -->
    <rect x="460" y="582" width="160" height="56" rx="8" fill="#F0F0F0" stroke="#5A5A5A" stroke-width="1.5"/>
    <use href="#i-answer" x="472" y="598" width="24" height="24" style="color:#5A5A5A"/>
    <text x="504" y="605" font-size="12" font-weight="600" fill="#3A3A3A">Answer</text>
    <text x="504" y="621" font-size="9.5" fill="#7A7A7A">generated</text>

    <!-- ============ COLUMN C · HyDE (centerX=900) ============ -->
    <!-- S1 Question -->
    <rect x="820" y="92" width="160" height="56" rx="8" fill="#F0F0F0" stroke="#5A5A5A" stroke-width="1.5"/>
    <use href="#i-question" x="832" y="108" width="24" height="24" style="color:#5A5A5A"/>
    <text x="864" y="115" font-size="12" font-weight="600" fill="#3A3A3A">Question</text>
    <text x="864" y="131" font-size="9.5" fill="#7A7A7A">clinical (ES)</text>

    <!-- arrow S1→S2 -->
     <line class="flow" x1="900" y1="150" x2="900" y2="190"/>
    <text x="908" y="173" font-size="9.5" fill="#8A8A8A">prompt</text>

    <!-- S2 Hypothetical generator (orange) -->
    <rect x="820" y="192" width="160" height="56" rx="8" fill="#FBEBDC" stroke="#D3651F" stroke-width="1.5"/>
    <use href="#i-wand" x="832" y="208" width="24" height="24" style="color:#A84E16"/>

    <!-- arrow S2→S3 -->
     <line class="flow" x1="900" y1="250" x2="900" y2="290"/>
    <text x="908" y="273" font-size="9.5" fill="#8A8A8A">hypothetical doc.</text>

    <!-- S3 Hypothetical document (orange-light, italic, sparkles) -->
     <rect class="dashed-node" x="820" y="292" width="160" height="56" rx="8" fill="#FBEBDC" stroke="#D3651F"/>
    <use href="#i-sparkles" x="832" y="308" width="22" height="22" style="color:#C97A40"/>

    <!-- arrow S3→S4 -->
     <line class="flow" x1="900" y1="350" x2="900" y2="390"/>
    <text x="908" y="372" font-size="9.5" fill="#8A8A8A">embed + retrieve</text>

    <!-- S4 Dense retrieval (teal — same retrieval color as Hybrid) -->
    <rect x="820" y="392" width="160" height="56" rx="8" fill="#E2F3F0" stroke="#009988" stroke-width="1.5"/>
    <use href="#i-search" x="832" y="408" width="24" height="24" style="color:#006861"/>
    <text x="864" y="413" font-size="11.5" font-weight="600" fill="#006861">Dense retrieval</text>
    <text x="864" y="429" font-size="9.5" fill="#3F9A8C">BGE-M3 · cosine</text>

    <!-- arrow S4→S5 -->
     <line class="flow" x1="900" y1="450" x2="900" y2="490"/>
    <text x="908" y="472" font-size="9.5" fill="#8A8A8A">top-k = 5 chunks</text>

    <!-- S5 LLM -->
    <rect x="820" y="492" width="160" height="56" rx="8" fill="#E1F0F8" stroke="#0077BB" stroke-width="1.5"/>
    <use href="#i-llm" x="832" y="508" width="24" height="24" style="color:#025a8c"/>
    <text x="864" y="515" font-size="12" font-weight="600" fill="#025a8c">Model</text>

    <!-- arrow S5→S6 -->
     <line class="flow" x1="900" y1="550" x2="900" y2="582"/>
    <text x="908" y="570" font-size="9.5" fill="#8A8A8A">generates</text>

    <!-- S6 Answer -->
    <rect x="820" y="582" width="160" height="56" rx="8" fill="#F0F0F0" stroke="#5A5A5A" stroke-width="1.5"/>
    <use href="#i-answer" x="832" y="598" width="24" height="24" style="color:#5A5A5A"/>
    <text x="864" y="605" font-size="12" font-weight="600" fill="#3A3A3A">Answer</text>
    <text x="864" y="621" font-size="9.5" fill="#7A7A7A">generated</text>
