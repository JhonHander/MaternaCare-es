<!doctype html>
<html lang="en">
<body>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1400" height="760" viewBox="0 0 1400 760" role="img"
     aria-labelledby="title desc">
  <title id="title">Grounded QLoRA fine-tuning flow</title>
  <desc id="desc">MaternaQA-es context-question examples are used to train a quantized base model with a trainable LoRA adapter. A separate closed-book SFT variant is shown below.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" markerWidth="6" markerHeight="6" refX="8.5" refY="5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#4A4A4A"/>
    </marker>
    <marker id="arrow-dashed" viewBox="0 0 10 10" markerWidth="5.5" markerHeight="5.5" refX="8.5" refY="5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#9A9A9A"/>
    </marker>
    <style>
      text { font-family: Helvetica, Arial, sans-serif; fill: #222; }
      .label { font-size: 17px; font-weight: 700; }
      .detail { font-size: 14px; }
      .small { font-size: 13px; }
      .section { font-size: 15px; font-weight: 700; letter-spacing: 1.5px; fill: #5A5A5A; }
      .kicker { font-size: 13px; font-weight: 700; letter-spacing: 1px; fill: #5A5A5A; }
      .node { stroke: #5A5A5A; stroke-width: 1.5; rx: 8; }
      .panel { fill: #FFF; stroke: #D0D0D0; stroke-width: 1.2; rx: 16; }
      rect[fill="#E1F0F8"] { fill: #BBE5F2; }
      rect[fill="#E2F3F0"] { fill: #D6EFD9; }
      rect[fill="#FBEBDC"] { fill: #FBE0B8; }
      .flow { fill: none; stroke: #4A4A4A; stroke-width: 1.5; marker-end: url(#arrow); }
      .dashed { fill: none; stroke: #9A9A9A; stroke-width: 1.4; stroke-dasharray: 5 4; marker-end: url(#arrow-dashed); }
      .rule { stroke: #D0D0D0; stroke-width: 1; }
    </style>
    <g id="dataIcon" fill="none" stroke="#222" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 3h10l4 4v14H5zM15 3v5h4M8 12h8M8 16h8M8 20h5"/>
    </g>
    <g id="questionIcon" fill="none" stroke="#222" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 5h16v12H8l-4 4zM9 9a3 3 0 0 1 6 0c0 2-3 2-3 4M12 16h.01"/>
    </g>
    <symbol id="modelIcon" viewBox="0 0 24 24" fill="none" stroke="#222" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="5" y="5" width="14" height="14" rx="2"/><path d="M9 1v4M15 1v4M9 19v4M15 19v4M1 9h4M1 15h4M19 9h4M19 15h4M9 10h6M9 14h6"/>
    </symbol>
    <symbol id="adapterIcon" viewBox="0 0 24 24" fill="none" stroke="#222" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="m12 2 9 5-9 5-9-5 9-5Z"/><path d="m3 12 9 5 9-5"/><path d="m3 17 9 5 9-5"/>
    </symbol>
    <g id="crossIcon" fill="none" stroke="#5A5A5A" stroke-width="3" stroke-linecap="round">
      <path d="M3 3l18 18M21 3L3 21"/>
    </g>
  </defs>

  <text class="section" x="50" y="48">GROUNDED QLORA FINE-TUNING</text>
  <path class="rule" d="M50 66H1350"/>

  <!-- Training inputs -->
  <g transform="translate(50 105)">
    <rect class="panel" width="330" height="285"/>
    <text class="kicker" x="24" y="30">MATERNAQA-ES TRAINING DATA</text>
    <g transform="translate(24 55)">
      <rect class="node" width="282" height="82" fill="#E1F0F8"/>
      <use xlink:href="#dataIcon" x="18" y="28" width="26" height="26"/>
      <text class="label" x="60" y="36">Source context</text>
      <text class="small" x="60" y="59">retrieved evidence</text>
    </g>
    <g transform="translate(24 165)">
      <rect class="node" width="282" height="82" fill="#E2F3F0"/>
      <use xlink:href="#questionIcon" x="18" y="28" width="26" height="26"/>
      <text class="label" x="60" y="36">Question</text>
      <text class="small" x="60" y="59">Spanish obstetric QA item</text>
    </g>
  </g>

  <!-- QLoRA composite -->
  <g transform="translate(520 105)">
    <rect class="panel" width="430" height="285"/>
    <text class="kicker" x="24" y="30">QLORA TRAINING</text>
    <g transform="translate(24 55)">
      <rect class="node" width="270" height="190" fill="#E1F0F8"/>
       <use xlink:href="#modelIcon" x="114" y="23" width="42" height="42"/>
      <text class="label" x="135" y="105" text-anchor="middle">Base LLM</text>
      <text class="detail" x="135" y="131" text-anchor="middle">4-bit quantized</text>
      <text class="detail" x="135" y="153" text-anchor="middle">weights frozen</text>
    </g>
    <g transform="translate(245 102)">
      <rect class="node" width="145" height="168" fill="#FBEBDC"/>
       <use xlink:href="#adapterIcon" x="53" y="23" width="38" height="38"/>
      <text class="label" x="72" y="91" text-anchor="middle">LoRA</text>
      <text class="label" x="72" y="113" text-anchor="middle">adapter</text>
      <text class="small" x="72" y="139" text-anchor="middle">trainable</text>
    </g>
  </g>

  <!-- Grounded model output -->
  <g transform="translate(1035 145)">
    <rect class="node" width="315" height="205" fill="#E2F3F0"/>
     <use xlink:href="#modelIcon" x="135" y="27" width="44" height="44"/>
    <text class="label" x="157" y="115" text-anchor="middle">Grounded QLoRA</text>
    <text class="label" x="157" y="139" text-anchor="middle">model</text>
    <text class="detail" x="157" y="169" text-anchor="middle">base weights + trained adapter</text>
  </g>

  <!-- Training connectors are drawn above node fills so arrowheads remain visible. -->
  <path class="flow" d="M380 201H544"/>
  <path class="flow" d="M380 311H544"/>
  <path class="flow" d="M950 247H1035"/>

  <!-- Closed-book contrast -->
  <text class="section" x="50" y="455">CLOSED-BOOK SFT VARIANT</text>
  <path class="rule" d="M50 473H1350"/>
  <rect x="380" y="505" width="640" height="175" rx="16" fill="#FFF" stroke="#D0D0D0" stroke-width="1.2" stroke-dasharray="5 4"/>
  <text class="kicker" x="405" y="535">QUESTION-ONLY TRAINING PATH</text>

  <g transform="translate(425 555)">
    <rect class="node" width="220" height="82" fill="#E2F3F0"/>
    <use xlink:href="#questionIcon" x="18" y="28" width="26" height="26"/>
    <text class="label" x="60" y="36">Question</text>
    <text class="small" x="60" y="59">no source context</text>
  </g>
  <g transform="translate(735 555)">
    <rect class="node" width="235" height="82" fill="#F0F0F0"/>
    <use xlink:href="#modelIcon" x="18" y="28" width="26" height="26"/>
    <text class="label" x="60" y="36">Base LLM</text>
    <text class="small" x="60" y="59">4-bit quantized</text>
  </g>
  <path class="flow" d="M645 596H735"/>
  <path class="dashed" d="M970 596H1080"/>
  <use xlink:href="#crossIcon" x="1090" y="585" width="42" height="42"/>
  <text class="small" x="1145" y="609">no grounded adapter</text>
</svg>
</body>
</html>
